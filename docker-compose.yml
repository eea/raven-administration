services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: raven-api
    container_name: raven-api
    sysctls:
      - net.ipv4.tcp_keepalive_time=200
    ports:
      - ${API_PORT:-5000}:5000
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    image: raven-client
    container_name: raven-client
    depends_on:
      - api
    ports:
      - ${CLIENT_PORT:-80}:80
