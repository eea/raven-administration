services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: ${CONTAINER_NAME_API:-raven-api}
    container_name: ${CONTAINER_NAME_API:-raven-api}
    sysctls:
      - net.ipv4.tcp_keepalive_time=200
    ports:
      - ${API_PORT:-5000}:5000
    restart: always
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    image: ${CONTAINER_NAME_CLIENT:-raven-client}
    container_name: ${CONTAINER_NAME_CLIENT:-raven-client}
    depends_on:
      - api
    ports:
      - ${CLIENT_PORT:-80}:80
    restart: always
  cron:
    build:
      context: .
      dockerfile: Dockerfile.cron
    image: ${CONTAINER_NAME_CRON:-raven-cron}
    container_name: ${CONTAINER_NAME_CRON:-raven-cron}
    restart: always
