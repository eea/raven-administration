<virtualhost *:80>
    Servername localhost

    DocumentRoot /app

    <Directory /app>
       Options Indexes FollowSymLinks MultiViews

       RewriteEngine On
       RewriteBase /
       RewriteRule ^index\.html$ - [L]
       RewriteCond %{REQUEST_FILENAME} !-f
       RewriteCond %{REQUEST_FILENAME} !-d
       RewriteRule . /index.html [L]

       #AllowOverride All
       Order allow,deny
       allow from all
    </Directory>
</virtualhost>